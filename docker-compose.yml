services:
  edelmore:
    build: .
    restart: unless-stopped
    # Docker's tini forwards SIGTERM to node (adapter-node shuts down
    # gracefully on it); without init, node ignored the signal and every
    # docker stop / image update escalated to SIGKILL — potentially
    # mid-SQLite-write. The grace period gives in-flight saves time.
    init: true
    stop_grace_period: 30s
    # Loads .env into the container (cp .env.example .env first). Only
    # DATABASE_URL is required; the transcription (Whisper) and narration
    # (Kokoro TTS) vars are optional — leave them blank in .env to run without
    # voice. The image bundles neither service.
    env_file:
      - .env
    environment:
      # Override the DB path to the mounted volume, regardless of .env.
      - DATABASE_URL=/data/edelmore.db
      # The diary's "today" is the household's wall-clock day. Without this
      # the container runs in UTC and the server disagrees with the browser
      # about which date is today every evening. Override via TZ in .env.
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./data:/data
    ports:
      - "3000:3000"
