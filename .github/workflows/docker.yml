name: Build and publish Docker image

on:
  push:
    branches: [main]

jobs:
  # The image publishes to a public registry — never ship a red main.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Tests with coverage floor
        run: npm run test:coverage

  build:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/edelmore-diary:latest
            ghcr.io/${{ github.repository_owner }}/edelmore-diary:${{ github.sha }}
